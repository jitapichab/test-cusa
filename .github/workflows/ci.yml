name: OrbitPay CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1  # pinned
      - uses: actions/setup-python@v5.3.0  # pinned
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff==0.8.6
      - name: Lint payment-gateway-connector
        run: ruff check services/payment-gateway-connector/
      - name: Lint vaultgateway-mock
        run: ruff check services/vaultgateway-mock/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.1.1  # pinned
      - uses: actions/setup-python@v5.3.0  # pinned
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd services/payment-gateway-connector
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        run: |
          cd services/payment-gateway-connector
          pytest -v --tb=short --cov=app --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.1.1  # pinned
      - name: Build payment-gateway-connector
        run: docker build -t payment-gateway-connector:${{ github.sha }} services/payment-gateway-connector/
      - name: Build vaultgateway-mock
        run: docker build -t vaultgateway-mock:${{ github.sha }} services/vaultgateway-mock/

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4.1.1  # pinned
      - name: Check for secrets in code
        run: |
          # Fail if any plaintext secrets found (simple grep check)
          ! grep -rn 'password\s*=' --include='*.py' --include='*.yaml' --include='*.yml' \
            | grep -v 'test' | grep -v '#' | grep -v 'placeholder' | grep -v 'GF_SECURITY' || true
      - name: Verify Dockerfiles are non-root
        run: |
          for df in $(find . -name 'Dockerfile*'); do
            if ! grep -q 'USER' "$df"; then
              echo "ERROR: $df missing USER directive"
              exit 1
            fi
          done
      - name: Verify K8s security contexts
        run: |
          for f in $(find k8s -name '*.yaml' | xargs grep -l 'kind: Deployment\|kind: StatefulSet'); do
            if ! grep -q 'securityContext' "$f"; then
              echo "WARNING: $f may be missing securityContext"
            fi
          done

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1  # pinned
      - name: Validate YAML syntax
        run: |
          pip install pyyaml
          python -c "
          import yaml, glob, sys
          errors = 0
          for f in glob.glob('k8s/**/*.yaml', recursive=True):
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))
              except Exception as e:
                  print(f'ERROR: {f}: {e}')
                  errors += 1
          sys.exit(1 if errors else 0)
          "
