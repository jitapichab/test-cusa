apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultgateway-mock
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: vaultgateway-mock
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: mock-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vaultgateway-mock
      app.kubernetes.io/part-of: orbitpay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vaultgateway-mock
        app.kubernetes.io/part-of: orbitpay
        app.kubernetes.io/component: mock-gateway
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vaultgateway-mock
          image: vaultgateway-mock:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: vaultgateway-mock-config
          env:
            - name: VALID_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: vaultgateway-mock-secret
                  key: VALID_API_KEYS
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
