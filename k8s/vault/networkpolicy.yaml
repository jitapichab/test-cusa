apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-network-policy
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/part-of: orbitpay
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vault
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from payment-gateway-connector
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: payment-gateway-connector
      ports:
        - port: 8200
          protocol: TCP
    # Allow traffic from vault-init job
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: vault-init
      ports:
        - port: 8200
          protocol: TCP
  egress:
    # DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
