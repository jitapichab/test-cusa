apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: vault-init
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: secrets-management
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-init
        app.kubernetes.io/part-of: orbitpay
        app.kubernetes.io/component: secrets-management
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vault-init
          image: hashicorp/vault:1.15.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /vault/config/vault-init.sh
          env:
            - name: VAULT_ADDR
              value: "http://vault.orbitpay.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-dev-token
                  key: VAULT_DEV_ROOT_TOKEN_ID
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config
              readOnly: true
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
            defaultMode: 0555
