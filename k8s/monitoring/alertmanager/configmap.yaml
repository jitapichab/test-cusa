apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'default'
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: 'critical-pagerduty'
          repeat_interval: 5m
        - match:
            severity: warning
          receiver: 'warning-slack'
          repeat_interval: 30m

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:9095/webhook'
            send_resolved: true
      - name: 'critical-pagerduty'
        webhook_configs:
          # Placeholder -- in production: PagerDuty integration key
          - url: 'http://localhost:9095/pagerduty'
            send_resolved: true
      - name: 'warning-slack'
        webhook_configs:
          # Placeholder -- in production: Slack webhook URL
          - url: 'http://localhost:9095/slack'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname']

    templates: []
