apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.orbitpay.svc.cluster.local:9093']

    scrape_configs:
      - job_name: 'payment-gateway-connector'
        static_configs:
          - targets: ['payment-gateway-connector.orbitpay.svc.cluster.local:8000']
        metrics_path: /metrics

      - job_name: 'vaultgateway-mock'
        static_configs:
          - targets: ['vaultgateway-mock.orbitpay.svc.cluster.local:8080']
        metrics_path: /metrics
