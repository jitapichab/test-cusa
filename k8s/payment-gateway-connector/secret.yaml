# WARNING: Dev-only secrets. In production, use Kubernetes auth method with Vault
# instead of static tokens. Never commit real secrets to version control.
apiVersion: v1
kind: Secret
metadata:
  name: payment-gateway-connector-secret
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: payment-gateway-connector
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: payment-processing
type: Opaque
data:
  # Base64 of "dev-root-token-orbitpay" — same dev token for simulation
  # In production: use Vault Kubernetes auth, not static tokens
  VAULT_TOKEN: ZGV2LXJvb3QtdG9rZW4tb3JiaXRwYXk=
  # Base64 of '["dev-api-key-orbitpay"]' — JSON list of valid API keys for endpoint auth
  # In production: use scoped tokens or mTLS, not static keys
  API_KEYS: WyJkZXYtYXBpLWtleS1vcmJpdHBheSJd
