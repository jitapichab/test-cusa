apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway-connector
  namespace: orbitpay
  labels:
    app.kubernetes.io/name: payment-gateway-connector
    app.kubernetes.io/part-of: orbitpay
    app.kubernetes.io/component: payment-processing
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-gateway-connector
      app.kubernetes.io/part-of: orbitpay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-gateway-connector
        app.kubernetes.io/part-of: orbitpay
        app.kubernetes.io/component: payment-processing
    spec:
      serviceAccountName: payment-gateway-connector
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: payment-gateway-connector
          image: payment-gateway-connector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: payment-gateway-connector-config
          env:
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-connector-secret
                  key: VAULT_TOKEN
            - name: API_KEY_HASH
              valueFrom:
                secretKeyRef:
                  name: payment-gateway-connector-secret
                  key: API_KEY_HASH
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
